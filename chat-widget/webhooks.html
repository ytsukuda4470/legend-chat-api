<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhook管理 | レジェンドケアマネ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0d9488',
            'primary-dark': '#0f766e',
            'primary-light': '#ccfbf1',
            'primary-bg': '#f0fdfa',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #ccfbf1;
      border-top-color: #0d9488;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card { transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 16px rgba(13,148,136,0.10); }
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 20px; border-radius: 8px; font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: opacity 0.3s;
    }
    .toast.success { background: #d1fae5; color: #065f46; }
    .toast.error   { background: #fee2e2; color: #991b1b; }
    .toast.hidden  { opacity: 0; pointer-events: none; }
  </style>
</head>
<body class="bg-primary-bg min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-teal-100 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm font-bold">通</div>
      <div>
        <h1 class="text-lg font-bold text-primary-dark">Webhook管理</h1>
        <p class="text-xs text-gray-500">Google Chat スペースへの通知設定</p>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6 space-y-6">

    <!-- 新規登録フォーム -->
    <section class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h2 class="text-sm font-bold text-primary-dark mb-4">新規Webhook登録</h2>
      <form id="addForm" class="space-y-3">
        <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div>
            <label class="block text-xs text-gray-600 mb-1">スペース名 <span class="text-red-500">*</span></label>
            <input id="inputName" type="text" placeholder="例: ケアマネチーム"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary" />
          </div>
          <div>
            <label class="block text-xs text-gray-600 mb-1">有効/無効</label>
            <select id="inputEnabled"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary">
              <option value="true">有効</option>
              <option value="false">無効</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs text-gray-600 mb-1">Webhook URL <span class="text-red-500">*</span></label>
          <input id="inputUrl" type="url" placeholder="https://chat.googleapis.com/v1/spaces/..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary" />
        </div>

        <div>
          <label class="block text-xs text-gray-600 mb-2">通知内容</label>
          <div class="flex flex-wrap gap-4">
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" value="wam" class="content-check w-4 h-4 accent-primary" />
              WAM NET介護保険最新情報
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" value="mhlw" class="content-check w-4 h-4 accent-primary" />
              厚労省議事録
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" value="news" class="content-check w-4 h-4 accent-primary" />
              介護ニュース（JCMA・介護joint・ケアマネドットコム）
            </label>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="submit"
            id="addBtn"
            class="px-5 py-2 bg-primary hover:bg-primary-dark text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
            <span id="addBtnText">登録する</span>
          </button>
        </div>
      </form>
    </section>

    <!-- Webhook一覧 -->
    <section>
      <h2 class="text-sm font-bold text-primary-dark mb-3">登録済みWebhook</h2>
      <div id="webhookList">
        <div class="flex items-center justify-center py-12 text-gray-400 gap-3">
          <div class="spinner"></div>
          <p class="text-sm">読み込み中...</p>
        </div>
      </div>
    </section>

  </main>

  <!-- 削除確認ダイアログ -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-6 max-w-sm w-full mx-4">
      <h3 class="font-bold text-gray-800 mb-2">Webhookを削除しますか？</h3>
      <p id="deleteModalName" class="text-sm text-gray-600 mb-5"></p>
      <div class="flex gap-3 justify-end">
        <button id="deleteCancelBtn"
          class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <button id="deleteConfirmBtn"
          class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-medium transition-colors">
          削除する
        </button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast hidden"></div>

  <script>
    const API_BASE = 'https://legend-chat-api-936239225906.asia-northeast1.run.app';

    const webhookListEl = document.getElementById('webhookList');
    const addForm = document.getElementById('addForm');
    const deleteModal = document.getElementById('deleteModal');
    const deleteModalName = document.getElementById('deleteModalName');
    const deleteCancelBtn = document.getElementById('deleteCancelBtn');
    const deleteConfirmBtn = document.getElementById('deleteConfirmBtn');
    const toast = document.getElementById('toast');

    let pendingDeleteId = null;
    let toastTimer = null;

    // ==============================
    // トースト
    // ==============================
    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = 'toast hidden'; }, 3500);
    }

    // ==============================
    // 通知内容ラベル
    // ==============================
    const CONTENT_LABELS = {
      wam:  'WAM NET',
      mhlw: '厚労省議事録',
      news: '介護ニュース',
    };
    const CONTENT_BADGE = {
      wam:  'bg-green-100 text-green-800',
      mhlw: 'bg-cyan-100 text-cyan-800',
      news: 'bg-yellow-100 text-yellow-800',
    };

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function maskUrl(url) {
      if (!url || url.length < 4) return url;
      return '••••' + url.slice(-4);
    }

    // ==============================
    // Webhook一覧取得・描画
    // ==============================
    async function loadWebhooks() {
      webhookListEl.innerHTML = `
        <div class="flex items-center justify-center py-12 text-gray-400 gap-3">
          <div class="spinner"></div>
          <p class="text-sm">読み込み中...</p>
        </div>`;
      try {
        const res = await fetch(`${API_BASE}/api/webhooks`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const webhooks = await res.json();
        renderWebhooks(webhooks);
      } catch (e) {
        webhookListEl.innerHTML = `
          <div class="bg-red-50 border-l-4 border-red-400 rounded p-4 text-red-700 text-sm">
            <strong>エラーが発生しました</strong><br>${escHtml(e.message)}
          </div>`;
      }
    }

    function renderWebhooks(webhooks) {
      if (webhooks.length === 0) {
        webhookListEl.innerHTML = `
          <div class="text-center py-12 text-gray-400">
            <div class="text-3xl mb-2">📭</div>
            <p class="text-sm">まだWebhookが登録されていません</p>
          </div>`;
        return;
      }
      webhookListEl.innerHTML = webhooks.map(w => {
        const badges = (w.content_types || []).map(ct =>
          `<span class="text-xs px-2 py-0.5 rounded font-medium ${CONTENT_BADGE[ct] || 'bg-gray-100 text-gray-600'}">${escHtml(CONTENT_LABELS[ct] || ct)}</span>`
        ).join('');
        const enabledBadge = w.enabled
          ? '<span class="text-xs px-2 py-0.5 rounded bg-teal-100 text-teal-700 font-medium">有効</span>'
          : '<span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-500 font-medium">無効</span>';
        return `
          <div class="card bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-3" data-id="${escHtml(w.id)}">
            <div class="flex items-start justify-between gap-3 mb-2">
              <div>
                <h3 class="font-bold text-gray-800 text-sm">${escHtml(w.name)}</h3>
                <p class="text-xs text-gray-400 mt-0.5 font-mono">${escHtml(maskUrl(w.webhook_url))}</p>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                ${enabledBadge}
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2 mb-3">
              ${badges || '<span class="text-xs text-gray-400">通知内容なし</span>'}
            </div>
            <div class="flex gap-2 justify-end">
              <button
                class="test-btn px-3 py-1.5 text-xs border border-primary text-primary hover:bg-primary-light rounded-lg transition-colors font-medium"
                data-id="${escHtml(w.id)}" data-name="${escHtml(w.name)}">
                テスト送信
              </button>
              <button
                class="delete-btn px-3 py-1.5 text-xs border border-red-300 text-red-500 hover:bg-red-50 rounded-lg transition-colors font-medium"
                data-id="${escHtml(w.id)}" data-name="${escHtml(w.name)}">
                削除
              </button>
            </div>
          </div>`;
      }).join('');

      // テスト送信ボタン
      webhookListEl.querySelectorAll('.test-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const name = btn.dataset.name;
          const original = btn.textContent;
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;vertical-align:middle;"></span>';
          try {
            const res = await fetch(`${API_BASE}/api/webhooks/${id}/test`, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
              showToast(`「${name}」へのテスト送信が完了しました`, 'success');
            } else {
              showToast(`テスト送信失敗: ${data.detail || data.error}`, 'error');
            }
          } catch (e) {
            showToast(`テスト送信エラー: ${e.message}`, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = original;
          }
        });
      });

      // 削除ボタン
      webhookListEl.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          pendingDeleteId = btn.dataset.id;
          deleteModalName.textContent = `「${btn.dataset.name}」を削除します。この操作は取り消せません。`;
          deleteModal.classList.remove('hidden');
        });
      });
    }

    // ==============================
    // 削除ダイアログ
    // ==============================
    deleteCancelBtn.addEventListener('click', () => {
      deleteModal.classList.add('hidden');
      pendingDeleteId = null;
    });

    deleteConfirmBtn.addEventListener('click', async () => {
      if (!pendingDeleteId) return;
      const id = pendingDeleteId;
      deleteModal.classList.add('hidden');
      pendingDeleteId = null;

      try {
        const res = await fetch(`${API_BASE}/api/webhooks/${id}`, { method: 'DELETE' });
        if (res.ok) {
          showToast('Webhookを削除しました', 'success');
          await loadWebhooks();
        } else {
          const data = await res.json();
          showToast(`削除失敗: ${data.error}`, 'error');
        }
      } catch (e) {
        showToast(`削除エラー: ${e.message}`, 'error');
      }
    });

    // ==============================
    // 新規登録フォーム
    // ==============================
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('inputName').value.trim();
      const webhook_url = document.getElementById('inputUrl').value.trim();
      const enabled = document.getElementById('inputEnabled').value === 'true';
      const content_types = [...document.querySelectorAll('.content-check:checked')].map(c => c.value);

      if (!name) { showToast('スペース名を入力してください', 'error'); return; }
      if (!webhook_url || !webhook_url.startsWith('https://chat.googleapis.com/')) {
        showToast('Webhook URLは https://chat.googleapis.com/ で始まる必要があります', 'error');
        return;
      }

      const addBtn = document.getElementById('addBtn');
      const addBtnText = document.getElementById('addBtnText');
      addBtn.disabled = true;
      addBtnText.textContent = '登録中...';

      try {
        const res = await fetch(`${API_BASE}/api/webhooks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, webhook_url, content_types, enabled }),
        });
        const data = await res.json();
        if (res.ok) {
          showToast(`「${name}」を登録しました`, 'success');
          addForm.reset();
          await loadWebhooks();
        } else {
          showToast(`登録失敗: ${data.error}`, 'error');
        }
      } catch (e) {
        showToast(`登録エラー: ${e.message}`, 'error');
      } finally {
        addBtn.disabled = false;
        addBtnText.textContent = '登録する';
      }
    });

    // 初期読み込み
    loadWebhooks();
  </script>
</body>
</html>
